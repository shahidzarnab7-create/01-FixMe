<!DOCTYPE html>
<head>
    <title>Embedded Video</title>

    <style>
        /* Remove default spacing */
        body {
            margin: 0;
            height: 100vh;

            /* Centering (horizontal + vertical) */
            display: flex;
            justify-content: center;
            align-items: center;

            background-color: #2c2ff8;
        }

        video {
            max-width: 80%;
            border: 3px solid black;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <video controls loop poster="spongebob.jpg">
        <source src="Nullifier_  SpongeBob.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
