<!DOCTYPE html>
<head>
  <title>Alan Partridge Soundboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- this contains the text speaker -->
  <div class="tts">
    <h2>PSYCHEDELIC FISH</h2>
    <textarea id="text" placeholder="Type Here"></textarea>
    <button onclick="speakText()">Say it</button>
  </div>

  <div class="soundboard">
    <center>
    <h2>Sample Bank</h2>
    </center>

    <div class="grid" id="grid"></div>

    <div class="controls">
      <button id="prev" onclick="prevPage()">⬅</button>
      <button id="next" onclick="nextPage()">➡</button>
    </div>

  </div>
  <div class="video-container">
  <video autoplay loop muted poster="poster.jpg">
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

</div>

<script src="index.js"></script>
</body>
</html>
